<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">
    <div class="dashboard-container">
        <nav class="navbar">
            <div class="nav-left">
                <h1><i class="fas fa-home"></i> Dashboard</h1>
            </div>
            <div class="nav-right">
                <span class="username-display" id="usernameDisplay"></span>
                <button class="btn-logout" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="welcome-card">
                <h2><i class="fas fa-handshake"></i> Welcome!</h2>
                <p id="welcomeMessage" class="welcome-message"></p>
            </div>

            <div class="info-cards">
                <div class="info-card">
                    <h3><i class="fas fa-envelope"></i> Email</h3>
                    <p id="userEmail"></p>
                </div>
                <div class="info-card">
                    <h3><i class="fas fa-user"></i> Username</h3>
                    <p id="userUsername"></p>
                </div>
                <div class="info-card">
                    <h3><i class="fas fa-check-circle"></i> Status</h3>
                    <p><i class="fas fa-check"></i> Logged In</p>
                </div>
            </div>

            <div class="action-section">
                <h3><i class="fas fa-bolt"></i> Quick Actions</h3>
                <button class="action-btn" onclick="clearRememberedEmail()"><i class="fas fa-trash"></i> Clear
                    Remembered Email</button>
                <button class="action-btn" onclick="viewAllUsers()"><i class="fas fa-users"></i> View All Users</button>
            </div>

            <div id="usersListContainer" class="users-list-container" style="display: none;">
                <h3><i class="fas fa-list"></i> Registered Users</h3>
                <div id="usersList" class="users-list"></div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
