<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Authentication System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-card">
        <h2><i class="fas fa-lock"></i> LOGIN</h2>

        <form id="loginForm">
            <div class="input-box">
                <input type="email" id="loginEmail" placeholder="Email" required>
            </div>

            <div class="input-box">
                <div class="password-container">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePasswordLogin()"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
                <a href="#" class="forgot-password-link" onclick="handleForgotPassword(event)">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Login</button>

            <p class="form-footer">Don't have an account? <a href="register.html">Sign up here</a></p>
        </form>
    </div>

    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>

</html>
