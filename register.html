<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Authentication System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-card">
        <h2><i class="fas fa-user-plus"></i> REGISTER</h2>

        <form id="registerForm">
            <div class="input-box">
                <input type="text" id="registerUsername" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="email" id="registerEmail" placeholder="Email" required>
            </div>

            <div class="input-box">
                <div class="password-container">
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePasswordRegister()"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <div class="input-box">
                <div class="password-container">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <span class="toggle-password" onclick="toggleConfirmPassword()"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <button type="submit" class="btn">Sign Up</button>

            <p class="form-footer">Already have an account? <a href="login.html">Login here</a></p>
        </form>
    </div>

    <script src="auth.js"></script>
    <script src="register.js"></script>
</body>

</html>
